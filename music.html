<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Favorite Music</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0d0204 0%, #2a0f1a 25%, #4a1528 50%, #6b1e3e 75%, #3d1122 100%);
            font-family: 'Cormorant Garamond', 'Georgia', serif;
            overflow: visible;
            position: relative;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(ellipse at 30% 20%, rgba(212, 175, 55, 0.2) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(212, 175, 55, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 50% 50%, rgba(255, 215, 0, 0.08) 0%, transparent 60%);
            pointer-events: none;
        }

        .rose {
            position: absolute;
            font-size: 1.8rem;
            animation: float 25s infinite ease-in-out;
            opacity: 0.35;
            filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.4));
        }

        .rose:nth-child(1) { left: 8%; top: 12%; animation-delay: 0s; font-size: 2.2rem; }
        .rose:nth-child(2) { left: 92%; top: 18%; animation-delay: 3s; font-size: 2.5rem; }
        .rose:nth-child(3) { left: 5%; top: 65%; animation-delay: 6s; font-size: 2rem; }
        .rose:nth-child(4) { left: 88%; top: 75%; animation-delay: 2s; font-size: 2.3rem; }
        .rose:nth-child(5) { left: 15%; top: 85%; animation-delay: 5s; font-size: 2.8rem; }
        .rose:nth-child(6) { left: 75%; top: 8%; animation-delay: 8s; font-size: 2.1rem; }
        .rose:nth-child(7) { left: 3%; top: 35%; animation-delay: 4s; font-size: 2.4rem; }
        .rose:nth-child(8) { left: 95%; top: 50%; animation-delay: 7s; font-size: 2rem; }
        .rose:nth-child(9) { left: 25%; top: 5%; animation-delay: 10s; font-size: 2.6rem; }
        .rose:nth-child(10) { left: 70%; top: 90%; animation-delay: 1s; font-size: 2.2rem; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-3deg); }
            33% { transform: translateY(-25px) rotate(3deg); }
            66% { transform: translateY(15px) rotate(-2deg); }
        }

        .container {
            text-align: center;
            padding: 60px 50px;
            background: linear-gradient(160deg, #fffcf9 0%, #faf7f2 30%, #f5f0e8 70%, #ede8df 100%);
            border-radius: 8px;
            box-shadow: 
                0 0 0 1px rgba(139, 115, 85, 0.3),
                0 0 0 4px rgba(212, 175, 55, 0.3),
                0 0 0 5px rgba(139, 115, 85, 0.2),
                0 30px 80px rgba(0, 0, 0, 0.6),
                inset 0 0 80px rgba(255, 255, 255, 0.9);
            position: relative;
            z-index: 10;
            max-width: 600px;
            width: 92%;
        }

        .container::before {
            content: '';
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            bottom: 12px;
            border: 1px solid rgba(139, 115, 85, 0.25);
            border-radius: 4px;
            pointer-events: none;
        }

        .ornament-top {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 25px;
        }

        .ornament-line {
            width: 80px;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(139, 115, 85, 0.6), transparent);
        }

        .ornament-center {
            font-size: 2rem;
            color: #8b7355;
        }

        h1 {
            font-family: 'Playfair Display', serif;
            color: #4a1528;
            font-size: 2.2rem;
            margin-bottom: 12px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .subtitle {
            color: #6b4e3d;
            font-size: 1.2rem;
            margin-bottom: 40px;
            font-style: italic;
            letter-spacing: 1px;
            font-weight: 400;
        }

        .music-image {
            width: 280px;
            height: 280px;
            object-fit: cover;
            border-radius: 50%;
            border: 4px solid rgba(212, 175, 55, 0.5);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            margin-bottom: 35px;
            animation: rotate 20s linear infinite;
        }

        .music-image:hover {
            animation-play-state: paused;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .song-title {
            font-family: 'Playfair Display', serif;
            color: #4a1528;
            font-size: 1.5rem;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .song-artist {
            color: #6b4e3d;
            font-size: 1.1rem;
            font-style: italic;
            margin-bottom: 30px;
        }

        .audio-container {
            background: linear-gradient(145deg, #ffffff 0%, #faf8f5 100%);
            border: 1px solid rgba(139, 115, 85, 0.3);
            border-radius: 50px;
            padding: 20px 30px;
            margin: 25px 0 40px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
        }

        audio {
            width: 100%;
            height: 40px;
        }

        audio::-webkit-media-controls-panel {
            background: transparent;
        }

        .ornament-bottom {
            margin: 30px 0;
            font-size: 1.5rem;
            color: #8b7355;
            letter-spacing: 8px;
        }

        .btn {
            display: inline-block;
            padding: 16px 50px;
            background: transparent;
            color: #4a1528;
            text-decoration: none;
            border: 2px solid #8b7355;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn:hover {
            background: #4a1528;
            color: #fff;
            border-color: #4a1528;
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(74, 21, 40, 0.3);
        }

        .btn:hover::before {
            left: 100%;
        }

        @media (max-width: 600px) {
            h1 { font-size: 1.6rem; letter-spacing: 1px; }
            .container { padding: 50px 30px; }
            .ornament-line { width: 50px; }
            .music-image { width: 220px; height: 220px; }
        }
    </style>
</head>
<body>
    <div class="rose">🌹</div>
    <div class="rose">🌹</div>
    <div class="rose">🥀</div>
    <div class="rose">🌹</div>
    <div class="rose">🌹</div>
    <div class="rose">🥀</div>
    <div class="rose">🌹</div>
    <div class="rose">🌹</div>
    <div class="rose">🥀</div>
    <div class="rose">🌹</div>

    <div class="container">
        <div class="ornament-top">
            <div class="ornament-line"></div>
            <span class="ornament-center">♫</span>
            <div class="ornament-line"></div>
        </div>
        
        <h1>Our Melody</h1>
        <p class="subtitle">Every beat reminds me of you</p>
        
        <img src="yani.jpg" alt="Music Cover" class="music-image">
        
        <div class="song-title">Sa Bawat Sandali</div>
        <div class="song-artist">Amiel Sol</div>
        
        <div class="audio-container">
            <audio controls>
                <source src="Amiel Sol - Sa Bawat Sandali (Lyrics).mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>
        </div>
        
        <div class="ornament-bottom">~ ♪ ~</div>
        
        <a href="page2.html" class="btn">Go Back</a>
    </div>
</body>
</html>
